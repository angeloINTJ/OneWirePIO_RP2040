name: Arduino CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  compile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example:
          - BasicTemperature
          - MultiSensor
          - DiagnosticMode
          - ResolutionBenchmark
          - TemperatureScales

    steps:
      - uses: actions/checkout@v4

      - name: Compile ${{ matrix.example }}
        uses: arduino/compile-sketches@v1
        with:
          fqbn: rp2040:rp2040:rpipicow
          platforms: |
            - name: rp2040:rp2040
              source-url: https://github.com/earlephilhower/arduino-pico/releases/download/global/package_rp2040_index.json
          sketch-paths: |
            - examples/${{ matrix.example }}
          libraries: |
            - source-path: ./
