sentence=Hardware-accelerated 1-Wire and DS18B20 library using the RP2040 PIO coprocessor.
paragraph=Offloads all critical 1-Wire timing to the RP2040's PIO state machine, achieving deterministic, jitter-free communication even under heavy CPU load. Supports multiple sensors on independent pins, configurable resolution (9-12 bit), CRC validation, Celsius/Fahrenheit/Kelvin output, and full diagnostic capabilities. Zero bit-banging, zero interrupts.
